<svg viewBox="0 0 780 430" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="rbT rbD">
  <title id="rbT">Как читать план работ</title>
  <desc id="rbD">Доска задач: колонки — фазы проекта слева направо, строки — роли команды, ячейки — карточки-задачи; стопер блокирует задачу до завершения зависимости, а звёзды внизу показывают, что предъявить заказчику в конце каждой фазы.</desc>
  <style>
    .panel{fill:#f6f0e4}
    .frame{fill:none;stroke:#b3502a;stroke-width:3}
    .frameIn{fill:none;stroke:#d8c3a0;stroke-width:1}
    .ttl{font-family:Georgia,'Times New Roman',serif;fill:#1d1a15;font-weight:700}
    .sub{font-family:'Segoe UI',system-ui,sans-serif;fill:#564f43}
    .lab{font-family:'Segoe UI',sans-serif;fill:#564f43;font-weight:700}
    .col{font-family:Georgia,serif;fill:#9c6b32;font-weight:700}
    .grid{fill:none;stroke:#d8c3a0;stroke-width:1.2}
    .gridO{fill:none;stroke:#c9b48d;stroke-width:1.5}
    .card{fill:#d8e6e6;stroke:#266b72;stroke-width:1.4}
    .cardT{font-family:'Segoe UI',sans-serif;fill:#15454a;font-weight:600}
    .show{fill:#d5e8d4;stroke:#4f8a52;stroke-width:1.6}
    .showT{font-family:'Segoe UI',sans-serif;fill:#27502a;font-weight:700}
    .dep{stroke:#b5503e;stroke-width:2.2;fill:none}
    .depT{font-family:'Segoe UI',sans-serif;fill:#732c20;font-weight:600}
    .leg{font-family:'Segoe UI',sans-serif;fill:#6b5f4d}
  </style>

  <rect class="panel" x="8" y="8" width="764" height="414" rx="14"/>
  <rect class="frame" x="8" y="8" width="764" height="414" rx="14"/>
  <rect class="frameIn" x="14" y="14" width="752" height="402" rx="10"/>

  <text class="ttl" x="390" y="46" font-size="22" text-anchor="middle">Как читать план работ</text>
  <text class="sub" x="390" y="68" font-size="13" text-anchor="middle">фазы слева направо · роли — строки · карточки — задачи</text>

  <!-- стрелка времени сверху -->
  <path class="lead" d="M150 92 L630 92" stroke="#9c6b32" stroke-width="2.2" fill="none"/>
  <path d="M630 92 l-12 -5 l3 10 z" fill="#9c6b32"/>
  <rect x="352" y="82" width="76" height="20" rx="6" fill="#f6f0e4"/>
  <text class="sub" x="390" y="96" font-size="11.5" text-anchor="middle" font-weight="700">фазы (время)</text>

  <!-- мини-заголовки колонок -->
  <text class="col" x="270" y="124" font-size="13.5" text-anchor="middle">Фаза 1</text>
  <text class="col" x="430" y="124" font-size="13.5" text-anchor="middle">Фаза 2</text>
  <text class="col" x="590" y="124" font-size="13.5" text-anchor="middle">Фаза 3</text>

  <!-- сетка 3x3: x колонок 190..670 (шаг 160), y строк 138..354 (шаг 72) -->
  <!-- вертикальные линии колонок -->
  <line class="grid" x1="350" y1="138" x2="350" y2="354"/>
  <line class="grid" x1="510" y1="138" x2="510" y2="354"/>
  <!-- горизонтальные линии строк -->
  <line class="grid" x1="190" y1="210" x2="670" y2="210"/>
  <line class="grid" x1="190" y1="282" x2="670" y2="282"/>
  <!-- внешняя рамка сетки -->
  <rect class="gridO" x="190" y="138" width="480" height="216" rx="6"/>

  <!-- подписи строк ролей -->
  <text class="lab" x="178" y="178" font-size="12.5" text-anchor="end">Дизайн</text>
  <text class="lab" x="178" y="250" font-size="12.5" text-anchor="end">Фронтенд</text>
  <text class="lab" x="178" y="322" font-size="12.5" text-anchor="end">Бэкенд</text>

  <!-- карточки-задачи. Колонки центры: 270 / 430 / 590. Строки центры: 174 / 246 / 318 -->

  <!-- Дизайн · Фаза 1 (со стопером) -->
  <rect class="card" x="222" y="156" width="96" height="36" rx="7"/>
  <text class="cardT" x="278" y="179" font-size="11.5" text-anchor="middle">макет</text>
  <!-- глиф-стопер: красный кружок с диагональю, фигурами -->
  <circle cx="232" cy="166" r="9" fill="#f1d3c9" stroke="#b5503e" stroke-width="2.2"/>
  <line x1="226" y1="172" x2="238" y2="160" stroke="#b5503e" stroke-width="2.2"/>

  <!-- Фронтенд · Фаза 1 -->
  <rect class="card" x="222" y="228" width="96" height="36" rx="7"/>
  <text class="cardT" x="270" y="251" font-size="11.5" text-anchor="middle">каркас</text>

  <!-- Бэкенд · Фаза 2 (цель зависимости) -->
  <rect class="card" x="382" y="300" width="96" height="36" rx="7"/>
  <text class="cardT" x="430" y="323" font-size="11.5" text-anchor="middle">API данных</text>

  <!-- Дизайн · Фаза 2 -->
  <rect class="card" x="382" y="156" width="96" height="36" rx="7"/>
  <text class="cardT" x="430" y="179" font-size="11.5" text-anchor="middle">правки</text>

  <!-- Фронтенд · Фаза 3 -->
  <rect class="card" x="542" y="228" width="96" height="36" rx="7"/>
  <text class="cardT" x="590" y="251" font-size="11.5" text-anchor="middle">сборка</text>

  <!-- стрелка-зависимость от стопера (Фаза1) к карточке во Фазе2 -->
  <path class="dep" d="M241 174 C 300 230, 340 300, 380 314"/>
  <path d="M380 314 l-12 -2 l5 -9 z" fill="#b5503e"/>
  <rect x="300" y="252" width="58" height="19" rx="6" fill="#f6f0e4"/>
  <text class="depT" x="329" y="266" font-size="11.5" text-anchor="middle">стопер</text>

  <!-- нижняя строка: что показать (выхлоп фазы) -->
  <g>
    <rect class="show" x="222" y="366" width="96" height="30" rx="7"/>
    <!-- звезда -->
    <polygon points="240,373 242.6,378.3 248.4,379.1 244.2,383.2 245.2,389 240,386.2 234.8,389 235.8,383.2 231.6,379.1 237.4,378.3" fill="#4f8a52"/>
    <text class="showT" x="285" y="385" font-size="11" text-anchor="middle">что показать</text>
  </g>
  <g>
    <rect class="show" x="382" y="366" width="96" height="30" rx="7"/>
    <polygon points="400,373 402.6,378.3 408.4,379.1 404.2,383.2 405.2,389 400,386.2 394.8,389 395.8,383.2 391.6,379.1 397.4,378.3" fill="#4f8a52"/>
    <text class="showT" x="445" y="385" font-size="11" text-anchor="middle">что показать</text>
  </g>
  <g>
    <rect class="show" x="542" y="366" width="96" height="30" rx="7"/>
    <polygon points="560,373 562.6,378.3 568.4,379.1 564.2,383.2 565.2,389 560,386.2 554.8,389 555.8,383.2 551.6,379.1 557.4,378.3" fill="#4f8a52"/>
    <text class="showT" x="605" y="385" font-size="11" text-anchor="middle">что показать</text>
  </g>

  <!-- легенда внизу -->
  <rect x="190" y="404" width="13" height="13" rx="3" class="card"/>
  <text class="leg" x="210" y="415" font-size="11.5">карточка-задача</text>

  <circle cx="350" cy="410.5" r="7.5" fill="#f1d3c9" stroke="#b5503e" stroke-width="2"/>
  <line x1="345" y1="415.5" x2="355" y2="405.5" stroke="#b5503e" stroke-width="2"/>
  <text class="leg" x="364" y="415" font-size="11.5">стопер — зависимость</text>

  <rect x="540" y="404" width="13" height="13" rx="3" class="show"/>
  <polygon points="546.5,406 547.7,408.4 550.3,408.8 548.4,410.6 548.9,413.2 546.5,411.9 544.1,413.2 544.6,410.6 542.7,408.8 545.3,408.4" fill="#4f8a52"/>
  <text class="leg" x="560" y="415" font-size="11.5">что показать</text>
</svg>
