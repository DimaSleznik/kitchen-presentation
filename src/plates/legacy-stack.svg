<svg viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">Три системы Häcker сегодня</title>
  <desc id="d">Сегодня Häcker работает на трёх старых системах: каталог-стандарт IDM оставляем как канал, а редактор imos и хранилище Navigram заменяем своим.</desc>
  <style>
    .panel{fill:#f6f0e4}
    .frame{fill:none;stroke:#b3502a;stroke-width:3}
    .frameIn{fill:none;stroke:#d8c3a0;stroke-width:1}
    .ttl{font-family:Georgia,'Times New Roman',serif;fill:#1d1a15;font-weight:700}
    .sub{font-family:'Segoe UI',system-ui,sans-serif;fill:#564f43}
    .keep{fill:#d8e6e6;stroke:#266b72;stroke-width:1.8}
    .repl{fill:#f3e0d2;stroke:#b3502a;stroke-width:1.8}
    .nameKeep{font-family:Georgia,serif;fill:#15454a;font-weight:700}
    .nameRepl{font-family:Georgia,serif;fill:#6b4a36;font-weight:700}
    .descKeep{font-family:'Segoe UI',sans-serif;fill:#15454a}
    .descRepl{font-family:'Segoe UI',sans-serif;fill:#6b4a36}
    .noteKeep{font-family:'Segoe UI',sans-serif;fill:#266b72;font-style:italic}
    .noteRepl{font-family:'Segoe UI',sans-serif;fill:#b3502a;font-style:italic}
    .tagKeepBox{fill:#266b72;stroke:#1d4f54;stroke-width:1.2}
    .tagReplBox{fill:#b3502a;stroke:#8c3d1f;stroke-width:1.2}
    .tagTxt{font-family:'Segoe UI',sans-serif;fill:#f6f0e4;font-weight:700}
    .leg{font-family:'Segoe UI',sans-serif;fill:#564f43}
  </style>

  <rect class="panel" x="8" y="8" width="744" height="364" rx="14"/>
  <rect class="frame" x="8" y="8" width="744" height="364" rx="14"/>
  <rect class="frameIn" x="14" y="14" width="732" height="352" rx="10"/>

  <text class="ttl" x="380" y="46" font-size="22" text-anchor="middle">Три системы Häcker сегодня</text>
  <text class="sub" x="380" y="68" font-size="13.5" text-anchor="middle">уходим от двух из трёх</text>

  <!-- Row 1 — IDM (KEEP) -->
  <rect class="keep" x="40" y="88" width="680" height="74" rx="11"/>
  <text class="nameKeep" x="62" y="118" font-size="20">IDM</text>
  <text class="descKeep" x="62" y="139" font-size="13.5">Каталог-стандарт: товары, цены, правила</text>
  <text class="noteKeep" x="62" y="156" font-size="11.5">отраслевой формат — отдаём наружу</text>
  <rect class="tagKeepBox" x="558" y="113" width="142" height="34" rx="9"/>
  <text class="tagTxt" x="629" y="135" font-size="14.5" text-anchor="middle">ОСТАВЛЯЕМ</text>

  <!-- Row 2 — imos (REPLACE) -->
  <rect class="repl" x="40" y="172" width="680" height="74" rx="11"/>
  <text class="nameRepl" x="62" y="202" font-size="20">imos</text>
  <text class="descRepl" x="62" y="223" font-size="13.5">Сложный редактор: 3D-формы и команды станкам</text>
  <text class="noteRepl" x="62" y="240" font-size="11.5">тяжёлый и закрытый — собираем свой</text>
  <rect class="tagReplBox" x="558" y="192" width="142" height="34" rx="9"/>
  <text class="tagTxt" x="629" y="214" font-size="14.5" text-anchor="middle">ДЕЛАЕМ СВОЁ</text>

  <!-- Row 3 — Navigram (REPLACE) -->
  <rect class="repl" x="40" y="256" width="680" height="74" rx="11"/>
  <text class="nameRepl" x="62" y="286" font-size="20">Navigram</text>
  <text class="descRepl" x="62" y="307" font-size="13.5">Облачное хранилище 3D-моделей</text>
  <text class="noteRepl" x="62" y="324" font-size="11.5">держим модели у себя</text>
  <rect class="tagReplBox" x="558" y="276" width="142" height="34" rx="9"/>
  <text class="tagTxt" x="629" y="298" font-size="14.5" text-anchor="middle">ДЕЛАЕМ СВОЁ</text>

  <!-- Legend -->
  <rect class="keep" x="40" y="344" width="16" height="16" rx="4"/>
  <text class="leg" x="64" y="357" font-size="12.5">бирюзовый = оставляем как канал</text>
  <rect class="repl" x="372" y="344" width="16" height="16" rx="4"/>
  <text class="leg" x="396" y="357" font-size="12.5">терракота = заменяем своим</text>
</svg>
