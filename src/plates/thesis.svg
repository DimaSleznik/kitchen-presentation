<svg viewBox="0 0 780 430" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="pltT pltD">
  <title id="pltT">Тысячи файлов против десятков шаблонов</title>
  <desc id="pltD">Слева — растущая стопка готовых GLB-файлов, по одному на каждую вариацию, с пометкой «комбинаторный взрыв». Справа — один шаблон, из которого по правилам рождаются и каталожные SKU, и кастом.</desc>
  <style>
    .panel{fill:#f6f0e4}
    .frame{fill:none;stroke:#b3502a;stroke-width:3}
    .frameIn{fill:none;stroke:#d8c3a0;stroke-width:1}
    .ttl{font-family:Georgia,'Times New Roman',serif;fill:#1d1a15;font-weight:700}
    .sub{font-family:'Segoe UI',system-ui,sans-serif;fill:#564f43}
    .lab{font-family:'Segoe UI',sans-serif;fill:#564f43;font-weight:700}
    .file{fill:#e7ddc9;stroke:#a99873;stroke-width:1.4}
    .fileT{font-family:'Segoe UI',sans-serif;fill:#7a6f5b}
    .tmpl{fill:#f3e0d2;stroke:#b3502a;stroke-width:2}
    .tmplT{font-family:Georgia,serif;fill:#1d1a15;font-weight:700}
    .tmplL{font-family:'Segoe UI',sans-serif;fill:#6b4a36}
    .sku{fill:#d8e6e6;stroke:#266b72;stroke-width:1.5}
    .skuT{font-family:'Segoe UI',sans-serif;fill:#15454a;font-weight:600}
    .lead{stroke:#8a7a5c;stroke-width:1.5;fill:none}
    .bad{stroke:#b5503e;stroke-width:2.4;fill:none}
    .badT{font-family:'Segoe UI',sans-serif;fill:#732c20;font-weight:600}
    .leg{font-family:'Segoe UI',sans-serif;fill:#6b5f4d}
  </style>

  <rect class="panel" x="8" y="8" width="764" height="414" rx="14"/>
  <rect class="frame" x="8" y="8" width="764" height="414" rx="14"/>
  <rect class="frameIn" x="14" y="14" width="752" height="402" rx="10"/>

  <text class="ttl" x="390" y="48" font-size="22" text-anchor="middle">Тысячи файлов  →  десятки шаблонов</text>
  <text class="sub" x="390" y="70" font-size="13" text-anchor="middle">и каталожные SKU, и кастом рождаются из одного шаблона по правилам</text>

  <text class="lab" x="140" y="106" font-size="13.5" text-anchor="middle">Сегодня</text>
  <text class="sub" x="140" y="124" font-size="11.5" text-anchor="middle">файл на каждую вариацию</text>

  <rect class="file" x="108" y="150" width="96" height="70" rx="8"/>
  <rect class="file" x="98" y="160" width="96" height="70" rx="8"/>
  <rect class="file" x="88" y="170" width="96" height="70" rx="8"/>
  <rect class="file" x="78" y="180" width="96" height="70" rx="8"/>
  <path d="M156 180 l18 0 l0 18 z" fill="#d8c9ad" stroke="#a99873" stroke-width="1.2"/>
  <text class="fileT" x="120" y="220" font-size="12" text-anchor="middle">GLB</text>

  <rect x="150" y="146" width="74" height="26" rx="13" fill="#f1d3c9" stroke="#b5503e" stroke-width="1.4"/>
  <text class="badT" x="187" y="163" font-size="13" text-anchor="middle">≈4 300</text>

  <circle class="bad" cx="140" cy="276" r="12"/>
  <path class="bad" d="M134 270 l12 12 M146 270 l-12 12"/>
  <text class="badT" x="140" y="306" font-size="12" text-anchor="middle">комбинаторный взрыв</text>
  <text class="sub" x="140" y="322" font-size="11.5" text-anchor="middle">из 61 SKU, и без кастома</text>

  <line x1="300" y1="100" x2="300" y2="360" stroke="#caa24a" stroke-width="1.3" stroke-dasharray="3 6"/>
  <path class="lead" d="M238 205 L356 205" stroke-width="2.4"/>
  <path d="M356 205 l-12 -5 l3 10 z" fill="#8a7a5c"/>
  <rect x="270" y="183" width="62" height="20" rx="6" fill="#f6f0e4"/>
  <text class="sub" x="301" y="197" font-size="11.5" text-anchor="middle" font-weight="700">+ правила</text>

  <text class="lab" x="560" y="106" font-size="13.5" text-anchor="middle" fill="#266b72">Наш путь</text>
  <text class="sub" x="560" y="124" font-size="11.5" text-anchor="middle">шаблон порождает вариации</text>

  <rect class="tmpl" x="430" y="158" width="150" height="104" rx="12"/>
  <text class="tmplT" x="505" y="190" font-size="18" text-anchor="middle">Шаблон</text>
  <text class="tmplL" x="505" y="214" font-size="11.5" text-anchor="middle">тип · параметры</text>
  <text class="tmplL" x="505" y="232" font-size="11.5" text-anchor="middle">build( )</text>

  <rect x="576" y="170" width="9" height="11" rx="2" fill="#f6f0e4" stroke="#b3502a" stroke-width="1.2"/>
  <rect x="576" y="194" width="9" height="11" rx="2" fill="#f6f0e4" stroke="#b3502a" stroke-width="1.2"/>
  <rect x="576" y="218" width="9" height="11" rx="2" fill="#f6f0e4" stroke="#b3502a" stroke-width="1.2"/>
  <rect x="576" y="242" width="9" height="11" rx="2" fill="#f6f0e4" stroke="#b3502a" stroke-width="1.2"/>

  <path class="lead" d="M585 175 L626 152"/>
  <rect class="sku" x="626" y="138" width="126" height="30" rx="8"/>
  <text class="skuT" x="689" y="157" font-size="12" text-anchor="middle" textLength="112" lengthAdjust="spacingAndGlyphs">600 · петля L · белый</text>

  <path class="lead" d="M585 199 L626 190"/>
  <rect class="sku" x="626" y="178" width="126" height="30" rx="8"/>
  <text class="skuT" x="689" y="197" font-size="12" text-anchor="middle" textLength="112" lengthAdjust="spacingAndGlyphs">800 · петля R · дуб</text>

  <path class="lead" d="M585 223 L626 230"/>
  <rect class="tmpl" x="626" y="218" width="126" height="30" rx="8"/>
  <text class="tmplT" x="689" y="237" font-size="12" text-anchor="middle" font-weight="600">637 · КАСТОМ</text>

  <path class="lead" d="M585 247 L626 270"/>
  <rect class="sku" x="626" y="258" width="126" height="30" rx="8"/>
  <text class="skuT" x="689" y="277" font-size="12" text-anchor="middle">…ещё тысячи</text>

  <rect x="60" y="392" width="13" height="13" rx="3" class="file"/>
  <text class="leg" x="80" y="403" font-size="11.5">готовый файл</text>
  <rect x="210" y="392" width="13" height="13" rx="3" class="tmpl"/>
  <text class="leg" x="230" y="403" font-size="11.5">шаблон</text>
  <rect x="330" y="392" width="13" height="13" rx="3" class="sku"/>
  <text class="leg" x="350" y="403" font-size="11.5">порождённый SKU</text>
</svg>