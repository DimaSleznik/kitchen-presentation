<svg viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">Три слоя данных каталога</title>
  <desc id="d">Три слоя данных каталога — геометрия, коммерция и правила — связаны одним общим артикулом: это одна и та же вещь во всех трёх слоях.</desc>
  <style>
    .panel{fill:#f6f0e4}
    .frame{fill:none;stroke:#b3502a;stroke-width:3}
    .frameIn{fill:none;stroke:#d8c3a0;stroke-width:1}
    .ttl{font-family:Georgia,'Times New Roman',serif;fill:#1d1a15;font-weight:700}
    .sub{font-family:'Segoe UI',system-ui,sans-serif;fill:#564f43}
    .geo{fill:#f3e0d2;stroke:#b3502a;stroke-width:1.8}
    .geoT{font-family:Georgia,serif;fill:#6b4a36;font-weight:700}
    .geoL{font-family:'Segoe UI',sans-serif;fill:#6b4a36}
    .com{fill:#d8e6e6;stroke:#266b72;stroke-width:1.8}
    .comT{font-family:Georgia,serif;fill:#15454a;font-weight:700}
    .comL{font-family:'Segoe UI',sans-serif;fill:#15454a}
    .rul{fill:#e6dcf2;stroke:#7a5aa6;stroke-width:1.8}
    .rulT{font-family:Georgia,serif;fill:#3f2c5c;font-weight:700}
    .rulL{font-family:'Segoe UI',sans-serif;fill:#3f2c5c}
    .num{font-family:Georgia,serif;fill:#1d1a15;font-weight:700}
    .numC{fill:#f6f0e4;stroke:#564f43;stroke-width:1.6}
    .brace{fill:none;stroke:#564f43;stroke-width:2.4}
    .braceT{font-family:'Segoe UI',sans-serif;fill:#1d1a15;font-weight:700}
    .foot{font-family:'Segoe UI',sans-serif;fill:#564f43}
  </style>

  <rect class="panel" x="8" y="8" width="744" height="344" rx="14"/>
  <rect class="frame" x="8" y="8" width="744" height="344" rx="14"/>
  <rect class="frameIn" x="14" y="14" width="732" height="332" rx="10"/>

  <text class="ttl" x="380" y="48" font-size="22" text-anchor="middle">Три слоя данных каталога</text>
  <text class="sub" x="380" y="70" font-size="13" text-anchor="middle">связаны одним артикулом</text>

  <!-- Слой 1 — ГЕОМЕТРИЯ -->
  <rect class="geo" x="78" y="96" width="500" height="62" rx="12"/>
  <circle class="numC" cx="110" cy="127" r="19"/>
  <text class="num" x="110" y="134" font-size="20" text-anchor="middle">1</text>
  <text class="geoT" x="150" y="123" font-size="17">ГЕОМЕТРИЯ</text>
  <text class="geoL" x="150" y="144" font-size="12.5">шаблоны + библиотека 3D-деталей (GLB)</text>

  <!-- Слой 2 — КОММЕРЦИЯ -->
  <rect class="com" x="78" y="166" width="500" height="62" rx="12"/>
  <circle class="numC" cx="110" cy="197" r="19"/>
  <text class="num" x="110" y="204" font-size="20" text-anchor="middle">2</text>
  <text class="comT" x="150" y="193" font-size="17">КОММЕРЦИЯ</text>
  <text class="comL" x="150" y="214" font-size="12.5">товары (SKU) · цена · опции</text>

  <!-- Слой 3 — ПРАВИЛА -->
  <rect class="rul" x="78" y="236" width="500" height="62" rx="12"/>
  <circle class="numC" cx="110" cy="267" r="19"/>
  <text class="num" x="110" y="274" font-size="20" text-anchor="middle">3</text>
  <text class="rulT" x="150" y="263" font-size="17">ПРАВИЛА</text>
  <text class="rulL" x="150" y="284" font-size="12.5">размеры · сетка · совместимость</text>

  <!-- Скоба, объединяющая 3 слоя -->
  <path class="brace" d="M612 96 L600 96 L600 297 L612 297"/>
  <path class="brace" d="M600 196.5 L592 196.5"/>
  <text class="braceT" x="652" y="196" font-size="14" text-anchor="middle"
        transform="rotate(90 652 196)" textLength="190" lengthAdjust="spacingAndGlyphs">идентичность артикула</text>

  <!-- Пояснение внизу -->
  <text class="foot" x="380" y="328" font-size="12.5" text-anchor="middle">один артикул — одна и та же вещь во всех трёх слоях</text>
</svg>
