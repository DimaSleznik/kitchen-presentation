<svg viewBox="0 0 800 410" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">Три роли искусственного интеллекта</title>
  <desc id="d">Сверху — широкая плашка-принцип «источник истины — наши правила». От неё вниз идут три линии к трём ролям ИИ: наполнение каталога, ассистент и фотопревью. Линии показывают, что правила проверяют результат ИИ. У каждой роли цветная метка статуса.</desc>
  <style>
    .panel{fill:#f6f0e4}
    .frame{fill:none;stroke:#b3502a;stroke-width:3}
    .frameIn{fill:none;stroke:#d8c3a0;stroke-width:1}
    .ttl{font-family:Georgia,'Times New Roman',serif;fill:#1d1a15;font-weight:700}
    .sub{font-family:'Segoe UI',system-ui,sans-serif;fill:#564f43}
    .prin{fill:#f3e0d2;stroke:#b3502a;stroke-width:2.4}
    .prinT{font-family:Georgia,serif;fill:#1d1a15;font-weight:700}
    .prinL{font-family:'Segoe UI',sans-serif;fill:#6b4a36}
    .role{fill:#d8e6e6;stroke:#266b72;stroke-width:1.6}
    .roleT{font-family:Georgia,serif;fill:#15454a;font-weight:700}
    .roleS{font-family:'Segoe UI',sans-serif;fill:#15454a}
    .lead{stroke:#266b72;stroke-width:1.8;fill:none;stroke-dasharray:4 4}
    .halo{fill:#f6f0e4}
    .haloT{font-family:'Segoe UI',sans-serif;fill:#564f43;font-weight:700}
    .leg{font-family:'Segoe UI',sans-serif;fill:#6b5f4d}
  </style>

  <rect class="panel" x="8" y="8" width="784" height="394" rx="14"/>
  <rect class="frame" x="8" y="8" width="784" height="394" rx="14"/>
  <rect class="frameIn" x="14" y="14" width="772" height="382" rx="10"/>

  <text class="ttl" x="400" y="48" font-size="23" text-anchor="middle">Три роли искусственного интеллекта</text>
  <text class="sub" x="400" y="71" font-size="13.5" text-anchor="middle">правила — главные, ИИ — ускоритель</text>

  <!-- блок-принцип (источник истины) -->
  <rect class="prin" x="180" y="92" width="440" height="62" rx="12"/>
  <text class="prinT" x="400" y="123" font-size="18" text-anchor="middle">Источник истины — наши правила</text>
  <text class="prinL" x="400" y="143" font-size="12.5" text-anchor="middle">ИИ не выдумывает геометрию — он только ускоряет</text>

  <!-- линии от принципа к ролям: правила проверяют результат ИИ -->
  <path class="lead" d="M280 154 L160 214"/>
  <path class="lead" d="M400 154 L400 214"/>
  <path class="lead" d="M520 154 L640 214"/>

  <!-- подпись на линиях с halo -->
  <rect class="halo" x="338" y="174" width="124" height="20" rx="6"/>
  <text class="haloT" x="400" y="189" font-size="11.5" text-anchor="middle">правила проверяют ИИ</text>

  <!-- РОЛЬ 1: Наполнение каталога -->
  <rect class="role" x="40" y="214" width="226" height="138" rx="12"/>
  <text class="roleT" x="153" y="244" font-size="16" text-anchor="middle">Наполнение каталога</text>
  <text class="roleS" x="153" y="270" font-size="12.5" text-anchor="middle">ИИ рисует черновики,</text>
  <text class="roleS" x="153" y="288" font-size="12.5" text-anchor="middle">человек проверяет</text>
  <rect x="73" y="308" width="160" height="28" rx="9" fill="#efe2cc" stroke="#9c6b32" stroke-width="1.4"/>
  <text x="153" y="327" font-size="12.5" text-anchor="middle" font-family="'Segoe UI',sans-serif" fill="#5e4422" font-weight="700">до запуска</text>

  <!-- РОЛЬ 2: Ассистент -->
  <rect class="role" x="287" y="214" width="226" height="138" rx="12"/>
  <text class="roleT" x="400" y="244" font-size="16" text-anchor="middle">Ассистент</text>
  <text class="roleS" x="400" y="270" font-size="12.5" text-anchor="middle">отвечает строго</text>
  <text class="roleS" x="400" y="288" font-size="12.5" text-anchor="middle">по правилам</text>
  <rect x="320" y="308" width="160" height="28" rx="9" fill="#d5e8d4" stroke="#4f8a52" stroke-width="1.4"/>
  <text x="400" y="327" font-size="12.5" text-anchor="middle" font-family="'Segoe UI',sans-serif" fill="#27502a" font-weight="700">в работе</text>

  <!-- РОЛЬ 3: Фотопревью -->
  <rect class="role" x="534" y="214" width="226" height="138" rx="12"/>
  <text class="roleT" x="647" y="244" font-size="16" text-anchor="middle">Фотопревью</text>
  <text class="roleS" x="647" y="270" font-size="12.5" text-anchor="middle">по 3D-форме делает</text>
  <text class="roleS" x="647" y="288" font-size="12.5" text-anchor="middle">фотокартинку</text>
  <rect x="567" y="308" width="160" height="28" rx="9" fill="#d5e8d4" stroke="#4f8a52" stroke-width="1.4"/>
  <text x="647" y="327" font-size="12.5" text-anchor="middle" font-family="'Segoe UI',sans-serif" fill="#27502a" font-weight="700">в работе</text>

  <!-- легенда -->
  <rect x="262" y="372" width="14" height="14" rx="3" fill="#d5e8d4" stroke="#4f8a52" stroke-width="1.4"/>
  <text class="leg" x="283" y="383.5" font-size="12">в работе</text>
  <text class="leg" x="360" y="383.5" font-size="12">·</text>
  <rect x="378" y="372" width="14" height="14" rx="3" fill="#efe2cc" stroke="#9c6b32" stroke-width="1.4"/>
  <text class="leg" x="399" y="383.5" font-size="12">до запуска</text>
</svg>
