<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">Забираем готовый результат, а не внутренний рецепт</title>
  <desc id="d">Пока imos доступен, прогоняем через него весь каталог и сохраняем у себя готовые результаты — 3D-форму, список деталей и команды станкам — в открытых форматах, которые остаются у нас навсегда.</desc>
  <style>
    .panel{fill:#f6f0e4}
    .frame{fill:none;stroke:#b3502a;stroke-width:3}
    .frameIn{fill:none;stroke:#d8c3a0;stroke-width:1}
    .ttl{font-family:Georgia,'Times New Roman',serif;fill:#1d1a15;font-weight:700}
    .sub{font-family:'Segoe UI',system-ui,sans-serif;fill:#564f43}
    .old{fill:#e7ddc9;stroke:#8a8270;stroke-width:1.8}
    .oldT{font-family:Georgia,serif;fill:#4a4536;font-weight:700}
    .oldL{font-family:'Segoe UI',sans-serif;fill:#6b6552}
    .new{fill:#d8e6e6;stroke:#266b72;stroke-width:1.8}
    .newT{font-family:Georgia,serif;fill:#15454a;font-weight:700}
    .newL{font-family:'Segoe UI',sans-serif;fill:#1c5258}
    .lead{fill:none;stroke:#8a8270;stroke-width:2.4}
    .note{font-family:'Segoe UI',sans-serif;fill:#8c3d1f;font-style:italic}
    .keepL{font-family:'Segoe UI',sans-serif;fill:#266b72;font-style:italic}
    .foot{font-family:'Segoe UI',sans-serif;fill:#564f43}
    .ico{fill:none;stroke:#266b72;stroke-width:2;stroke-linejoin:round;stroke-linecap:round}
  </style>

  <rect class="panel" x="8" y="8" width="744" height="404" rx="14"/>
  <rect class="frame" x="8" y="8" width="744" height="404" rx="14"/>
  <rect class="frameIn" x="14" y="14" width="732" height="392" rx="10"/>

  <text class="ttl" x="380" y="46" font-size="22" text-anchor="middle">Забираем результат, а не рецепт</text>
  <text class="sub" x="380" y="70" font-size="13" text-anchor="middle">пока imos доступен — прогоняем весь каталог и сохраняем готовое</text>

  <!-- ===== ЛЕВО: imos (чужой движок, время ограничено) ===== -->
  <rect class="old" x="44" y="150" width="190" height="132" rx="12"/>
  <!-- часы = доступ ограничен -->
  <circle cx="139" cy="190" r="16" fill="#f6f0e4" stroke="#8a8270" stroke-width="2"/>
  <line x1="139" y1="190" x2="139" y2="180" stroke="#6b6552" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="139" y1="190" x2="147" y2="194" stroke="#6b6552" stroke-width="2.2" stroke-linecap="round"/>
  <text class="oldT" x="139" y="234" font-size="20" text-anchor="middle">imos</text>
  <text class="oldL" x="139" y="256" font-size="12.5" text-anchor="middle">чужой движок</text>
  <text class="note" x="139" y="306" font-size="12" text-anchor="middle">доступ ограничен —</text>
  <text class="note" x="139" y="323" font-size="12" text-anchor="middle">скоро закроется</text>

  <!-- ===== СТРЕЛКИ: imos прогоняет каталог → три результата ===== -->
  <path class="lead" d="M234 198 L478 156"/>
  <path d="M478 156 l-14 -1 l7 9 z" fill="#8a8270"/>
  <path class="lead" d="M234 216 L478 240"/>
  <path d="M478 240 l-13 -5 l3 11 z" fill="#8a8270"/>
  <path class="lead" d="M234 234 L478 324"/>
  <path d="M478 324 l-13 2 l8 8 z" fill="#8a8270"/>

  <!-- подпись на стрелке с halo-подложкой -->
  <rect x="250" y="192" width="208" height="22" rx="6" fill="#f6f0e4"/>
  <text class="sub" x="354" y="207" font-size="12.5" text-anchor="middle" font-weight="700">прогоняем весь каталог</text>

  <!-- заголовок над результатами -->
  <path class="ico" d="M520 100 v-5 a6 6 0 0 1 12 0 v5" stroke="#266b72"/>
  <rect x="516" y="100" width="20" height="14" rx="2" fill="#d8e6e6" stroke="#266b72" stroke-width="1.6"/>
  <text class="keepL" x="546" y="111" font-size="12" text-anchor="start">остаётся у вас навсегда</text>

  <!-- результат 1 — 3D-форма -->
  <rect class="new" x="486" y="124" width="232" height="64" rx="10"/>
  <path class="ico" d="M508 145 l12 -7 l12 7 v14 l-12 7 l-12 -7 z M508 145 l12 7 l12 -7 M520 152 v14"/>
  <text class="newT" x="540" y="150" font-size="15.5" text-anchor="start">3D-форма</text>
  <text class="newL" x="540" y="170" font-size="11.5" text-anchor="start" textLength="160" lengthAdjust="spacingAndGlyphs">форма шкафа и деталей</text>

  <!-- результат 2 — список деталей -->
  <rect class="new" x="486" y="208" width="232" height="64" rx="10"/>
  <path class="ico" d="M507 233 h26 M507 241 h26 M507 249 h18"/>
  <text class="newT" x="540" y="234" font-size="15.5" text-anchor="start">Список деталей</text>
  <text class="newL" x="540" y="254" font-size="11.5" text-anchor="start" textLength="166" lengthAdjust="spacingAndGlyphs">панели · размер · материал</text>

  <!-- результат 3 — команды станкам -->
  <rect class="new" x="486" y="292" width="232" height="64" rx="10"/>
  <circle cx="520" cy="324" r="9" class="ico"/>
  <circle cx="520" cy="324" r="3" fill="#266b72"/>
  <path class="ico" d="M520 311 v4 M520 333 v4 M507 324 h4 M533 324 h4"/>
  <text class="newT" x="540" y="318" font-size="15.5" text-anchor="start">Команды станкам</text>
  <text class="newL" x="540" y="338" font-size="11.5" text-anchor="start" textLength="172" lengthAdjust="spacingAndGlyphs">программы для станков с ЧПУ</text>

  <!-- ПОДВАЛ -->
  <line x1="44" y1="376" x2="718" y2="376" stroke="#d8c3a0" stroke-width="1"/>
  <text class="foot" x="380" y="397" font-size="13" text-anchor="middle">команды станкам снимаем первыми — их нет нигде, кроме живого imos</text>
</svg>
